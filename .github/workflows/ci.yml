name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Go Report Card Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Install quality check tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/gordonklaus/ineffassign@latest
          go install github.com/client9/misspell/cmd/misspell@latest
          go install github.com/kisielk/errcheck@latest
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Run gofmt check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "The following files are not formatted with 'gofmt -s':"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run ineffassign
        run: ineffassign ./...

      - name: Run misspell
        run: |
          # Exclude test files, examples, and markdown docs (they contain intentional misspellings)
          misspell -error $(find . -type f \( -name '*.go' -o -name '*.yaml' -o -name '*.yml' \) ! -name '*_test.go' ! -path './examples/*' | grep -v vendor | grep -v generated | grep -v .git)

      - name: Run errcheck
        run: errcheck -exclude .errcheck-excludes ./...

      - name: Run gocyclo (threshold 45)
        run: |
          OUTPUT=$(gocyclo -over 45 .)
          if [ -n "$OUTPUT" ]; then
            echo "Functions with cyclomatic complexity over 45:"
            echo "$OUTPUT"
            exit 1
          fi

      - name: Run golangci-lint
        run: |
          echo "Running golangci-lint comprehensive checks..."
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run

      - name: Cleanup
        if: always()
        run: go clean -cache -testcache -modcache

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          POSTGRES_URL: postgres://test:test@localhost:5432/test?sslmode=disable
          MYSQL_URL: test:test@tcp(localhost:3306)/test

      - name: Display coverage
        run: go tool cover -func=coverage.out

      - name: Cleanup
        if: always()
        run: |
          go clean -cache -testcache -modcache
          rm -f coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Build verification
        run: go build -v ./...

      - name: Cleanup
        if: always()
        run: go clean -cache -testcache -modcache
